<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deutschlandfunk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --dlf-bg:       #0d1b2a;
    --dlf-panel:    #152338;
    --dlf-border:   #1e3250;
    --dlf-accent:   #4e9af1;
    --dlf-live:     #e8453c;
    --dlf-text:     #e8edf3;
    --dlf-muted:    #7a90a8;
    --dlf-btn:      #1e3250;
    --dlf-btn-h:    #2a4570;
  }

  html, body {
    height: 100%;
    background: var(--dlf-bg);
    color: var(--dlf-text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--dlf-border);
    flex-shrink: 0;
  }

  #dlf-logo {
    width: 52px;
    height: 52px;
    background: #1a73e8;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  #dlf-logo svg { width: 32px; height: 32px; }

  #header-text { flex: 1; min-width: 0; }

  #station-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--dlf-text);
  }

  #live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--dlf-live);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 2px 7px;
    border-radius: 3px;
    margin-top: 3px;
    opacity: 1;
    transition: opacity 0.3s;
  }

  #live-badge.delayed { background: var(--dlf-btn); color: var(--dlf-muted); }

  /* ── EPG Block ── */
  #epg-block {
    padding: 16px 20px;
    border-bottom: 1px solid var(--dlf-border);
    flex-shrink: 0;
    min-height: 90px;
  }

  #epg-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--dlf-muted);
    margin-bottom: 6px;
  }

  #epg-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--dlf-text);
    line-height: 1.3;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #epg-time {
    font-size: 13px;
    color: var(--dlf-muted);
  }

  #epg-progress-wrap {
    margin-top: 10px;
    height: 3px;
    background: var(--dlf-border);
    border-radius: 2px;
    overflow: hidden;
  }

  #epg-progress-bar {
    height: 100%;
    background: var(--dlf-accent);
    border-radius: 2px;
    width: 0%;
    transition: width 10s linear;
  }

  /* ── Stream Clock ── */
  #clock-block {
    padding: 14px 20px;
    border-bottom: 1px solid var(--dlf-border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #stream-clock {
    font-size: 36px;
    font-weight: 200;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
    color: var(--dlf-text);
  }

  #delay-indicator {
    font-size: 13px;
    color: var(--dlf-muted);
    text-align: right;
  }

  #delay-secs { color: var(--dlf-accent); font-weight: 600; }

  /* ── Controls ── */
  #controls {
    padding: 20px;
    flex-shrink: 0;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .btn {
    flex: 1;
    background: var(--dlf-btn);
    border: 1px solid var(--dlf-border);
    border-radius: 12px;
    color: var(--dlf-text);
    font-size: 15px;
    font-weight: 600;
    padding: 18px 8px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    user-select: none;
    -webkit-user-select: none;
  }

  .btn:active { background: var(--dlf-btn-h); transform: scale(0.97); }

  .btn .icon { font-size: 22px; }
  .btn .label { font-size: 11px; font-weight: 500; color: var(--dlf-muted); }

  #btn-play-pause { flex: 1.4; }
  #btn-play-pause .icon { font-size: 32px; }

  #btn-live {
    background: transparent;
    border-color: var(--dlf-live);
    color: var(--dlf-live);
  }

  #btn-live.at-live {
    background: var(--dlf-live);
    color: #fff;
  }

  #btn-live .label { color: inherit; opacity: 0.8; }

  /* ── Hour Jump ── */
  #hour-section {
    padding: 0 20px 16px;
    flex-shrink: 0;
  }

  #hour-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--dlf-muted);
    margin-bottom: 10px;
  }

  #hour-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
    padding-bottom: 4px;
  }

  #hour-scroll::-webkit-scrollbar { display: none; }

  .hour-btn {
    flex-shrink: 0;
    background: var(--dlf-btn);
    border: 1px solid var(--dlf-border);
    border-radius: 8px;
    color: var(--dlf-text);
    font-size: 14px;
    font-weight: 500;
    padding: 10px 16px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .hour-btn:active { background: var(--dlf-btn-h); }
  .hour-btn.active { background: var(--dlf-accent); border-color: var(--dlf-accent); color: #fff; }

  /* ── Status ── */
  #status-bar {
    margin-top: auto;
    padding: 12px 20px;
    font-size: 12px;
    color: var(--dlf-muted);
    text-align: center;
    border-top: 1px solid var(--dlf-border);
    flex-shrink: 0;
  }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--dlf-bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }

  #loading.hidden { display: none; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--dlf-border);
    border-top-color: var(--dlf-accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--dlf-muted); font-size: 14px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Verbinde…</p>
</div>

<div id="app">

  <div id="header">
    <div id="dlf-logo">
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="32" height="32" rx="6" fill="#1a73e8"/>
        <text x="4" y="23" font-size="18" font-weight="800" fill="white" font-family="Arial">dlf</text>
      </svg>
    </div>
    <div id="header-text">
      <div id="station-name">Deutschlandfunk</div>
      <div id="live-badge">● LIVE</div>
    </div>
  </div>

  <div id="epg-block">
    <div id="epg-label">Jetzt</div>
    <div id="epg-title">Wird geladen…</div>
    <div id="epg-time"></div>
    <div id="epg-progress-wrap">
      <div id="epg-progress-bar"></div>
    </div>
  </div>

  <div id="clock-block">
    <div id="stream-clock">--:--:--</div>
    <div id="delay-indicator">
      <span id="delay-secs">0</span>s zurück
    </div>
  </div>

  <div id="controls">
    <div class="btn-row">
      <button class="btn" id="btn-minus30" onclick="seek(-30)">
        <span class="icon">↩</span>
        <span class="label">30 s</span>
      </button>
      <button class="btn" id="btn-minus10" onclick="seek(-10)">
        <span class="icon">↺</span>
        <span class="label">10 s</span>
      </button>
      <button class="btn" id="btn-play-pause" onclick="togglePlay()">
        <span class="icon" id="play-icon">▶</span>
        <span class="label" id="play-label">Play</span>
      </button>
      <button class="btn" id="btn-plus10" onclick="seek(+10)">
        <span class="icon">↻</span>
        <span class="label">10 s</span>
      </button>
      <button class="btn" id="btn-live" onclick="goLive()">
        <span class="icon">▶▶</span>
        <span class="label">Live</span>
      </button>
    </div>
  </div>

  <div id="hour-section">
    <div id="hour-label">Zur vollen Stunde springen</div>
    <div id="hour-scroll"></div>
  </div>

  <div id="status-bar" id="status">Bereit</div>

</div>

<audio id="audio" preload="none"></audio>

<script>
// ── Config ──────────────────────────────────────────────
const HLS_URL     = 'https://dist.deutschlandfunk.de/dlf/hls-ard/master.m3u8';
const MP3_URL     = 'https://st01.sslstream.dlf.de/dlf/01/128/mp3/stream.mp3';
const PUBLISHER   = 'urn:ard:publisher:230618cb036fb289';
const EPG_API     = 'https://programm-api.ard.de/program/api/program';
const DVR_WINDOW  = 7200; // 2h in Sekunden

// ── State ────────────────────────────────────────────────
let hls = null;
let hlsReady = false;
let anchorWallclock = null; // Date-Objekt: Wallclock-Zeit als hls.liveSyncPosition gesetzt wurde
let anchorMediatime  = null; // entsprechende audio.currentTime
let epgData = [];            // [{title, start, end}]
let epgTimer = null;
let clockTimer = null;

const audio   = document.getElementById('audio');
const loading = document.getElementById('loading');

// ── Init ─────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildHourButtons();
  initPlayer();
  fetchEPG();
});

// ── HLS Player ──────────────────────────────────────────
function initPlayer() {
  if (Hls.isSupported()) {
    hls = new Hls({
      liveSyncDurationCount: 3,
      liveMaxLatencyDurationCount: 10,
      enableWorker: true,
    });
    hls.loadSource(HLS_URL);
    hls.attachMedia(audio);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      setAnchor();
      audio.play().catch(() => {});
    });

    hls.on(Hls.Events.LEVEL_LOADED, () => {
      if (!hlsReady) {
        hlsReady = true;
        loading.classList.add('hidden');
        startClockTimer();
      }
    });

    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) fallbackMP3();
    });
  } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
    audio.src = HLS_URL;
    audio.addEventListener('loadedmetadata', () => {
      setAnchor();
      loading.classList.add('hidden');
      startClockTimer();
      audio.play().catch(() => {});
    });
  } else {
    fallbackMP3();
  }

  audio.addEventListener('play',  updatePlayUI);
  audio.addEventListener('pause', updatePlayUI);
  audio.addEventListener('timeupdate', updateDelayAndEPG);
}

function fallbackMP3() {
  hls = null;
  audio.src = MP3_URL;
  loading.classList.add('hidden');
  audio.play().catch(() => {});
  setStatus('MP3-Fallback (kein Timeshift)');
  // disable seek buttons
  ['btn-minus30','btn-minus10','btn-plus10','btn-live'].forEach(id => {
    document.getElementById(id).style.opacity = '0.3';
    document.getElementById(id).style.pointerEvents = 'none';
  });
}

// ── Anchor: Wallclock↔Mediatime Mapping ─────────────────
function setAnchor() {
  if (!hls) return;
  const lsp = hls.liveSyncPosition;
  if (lsp && isFinite(lsp)) {
    anchorMediatime  = lsp;
    anchorWallclock  = new Date();
  }
}

// Aktuelle Wallclock-Zeit basierend auf audio.currentTime
function getStreamWallclock() {
  if (!anchorWallclock || !anchorMediatime) return null;
  const deltaSec = audio.currentTime - anchorMediatime;
  return new Date(anchorWallclock.getTime() + deltaSec * 1000);
}

// Versatz zur Live-Kante in Sekunden
function getDelaySecs() {
  if (!hls) return 0;
  const lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return 0;
  return Math.max(0, Math.round(lsp - audio.currentTime));
}

// ── Steuerung ───────────────────────────────────────────
function seek(deltaSec) {
  if (!hls) return;
  const newTime = audio.currentTime + deltaSec;
  const lsp = hls.liveSyncPosition;
  const minTime = lsp - DVR_WINDOW;
  audio.currentTime = Math.max(minTime, Math.min(lsp, newTime));
  updateLiveBadge();
}

function goLive() {
  if (!hls) return;
  const lsp = hls.liveSyncPosition;
  if (lsp && isFinite(lsp)) {
    audio.currentTime = lsp;
    setAnchor();
  }
  updateLiveBadge();
}

function togglePlay() {
  if (audio.paused) audio.play();
  else audio.pause();
}

// Sprung zu einem Wallclock-Zeitstempel
function jumpToWallclock(targetDate) {
  if (!hls || !anchorWallclock || !anchorMediatime) return;
  const lsp = hls.liveSyncPosition;
  const deltaFromAnchor = (targetDate - anchorWallclock) / 1000;
  const targetMediatime = anchorMediatime + deltaFromAnchor;
  const minTime = lsp - DVR_WINDOW;
  if (targetMediatime < minTime || targetMediatime > lsp) {
    setStatus('Zeitpunkt ausserhalb des DVR-Fensters (max. 2h)');
    return;
  }
  audio.currentTime = targetMediatime;
  updateLiveBadge();
}

// ── UI Updates ───────────────────────────────────────────
function updatePlayUI() {
  const icon  = document.getElementById('play-icon');
  const label = document.getElementById('play-label');
  if (audio.paused) { icon.textContent = '▶'; label.textContent = 'Play'; }
  else              { icon.textContent = '⏸'; label.textContent = 'Pause'; }
}

function updateLiveBadge() {
  const delay = getDelaySecs();
  const badge = document.getElementById('live-badge');
  const btnLive = document.getElementById('btn-live');
  if (delay < 8) {
    badge.textContent = '● LIVE';
    badge.classList.remove('delayed');
    btnLive.classList.add('at-live');
  } else {
    badge.textContent = '● ZEITVERSETZT';
    badge.classList.add('delayed');
    btnLive.classList.remove('at-live');
  }
}

function updateDelayAndEPG() {
  const delay = getDelaySecs();
  document.getElementById('delay-secs').textContent = delay;
  updateLiveBadge();
  updateEPGDisplay();
}

// ── Uhr ──────────────────────────────────────────────────
function startClockTimer() {
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(updateClock, 500);
  updateClock();
}

function updateClock() {
  const wc = getStreamWallclock();
  const el = document.getElementById('stream-clock');
  if (!wc) {
    // Fallback: Systemzeit
    el.textContent = new Date().toLocaleTimeString('de-DE');
    return;
  }
  el.textContent = wc.toLocaleTimeString('de-DE');
  // Anchor regelmässig nachkalibrieren wenn live
  if (getDelaySecs() < 8) setAnchor();
}

// ── EPG ──────────────────────────────────────────────────
async function fetchEPG() {
  try {
    const now = new Date();
    const dateStr = now.toISOString().slice(0, 10); // YYYY-MM-DD
    const url = `${EPG_API}?publisherId=${encodeURIComponent(PUBLISHER)}&date=${dateStr}&maxLength=48`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    parseEPG(json);
  } catch(e) {
    document.getElementById('epg-title').textContent = 'Programmdaten nicht verfügbar';
    console.warn('EPG Fehler:', e);
  }

  // Morgen auch laden (falls nah an Mitternacht)
  try {
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);
    const dateStr = tomorrow.toISOString().slice(0, 10);
    const url = `${EPG_API}?publisherId=${encodeURIComponent(PUBLISHER)}&date=${dateStr}&maxLength=48`;
    const res = await fetch(url);
    if (res.ok) {
      const json = await res.json();
      parseEPG(json, true);
    }
  } catch(e) {}

  // Alle 5 Minuten refreshen
  setTimeout(fetchEPG, 5 * 60 * 1000);
}

function parseEPG(json, append = false) {
  // ARD Programm-API Struktur erkunden
  let items = [];
  if (json.data) {
    // verschiedene mögliche Strukturen
    const d = json.data;
    if (Array.isArray(d)) items = d;
    else if (d.broadcastSchedule) items = d.broadcastSchedule;
    else if (d.items) items = d.items;
    else if (d.program) items = d.program;
    else {
      // Flach durchsuchen
      for (const key of Object.keys(d)) {
        if (Array.isArray(d[key])) { items = d[key]; break; }
      }
    }
  } else if (Array.isArray(json)) {
    items = json;
  } else if (json.broadcastSchedule) {
    items = json.broadcastSchedule;
  } else if (json.items) {
    items = json.items;
  }

  const parsed = items.map(item => ({
    title: item.title || item.broadcastTitle || item.show?.title || '?',
    start: new Date(item.broadcastStart || item.startDate || item.start || item.broadcastOn),
    end:   new Date(item.broadcastEnd   || item.endDate   || item.end   || item.broadcastEnd),
  })).filter(i => i.start && !isNaN(i.start));

  if (append) epgData = [...epgData, ...parsed].sort((a,b) => a.start-b.start);
  else        epgData = parsed.sort((a,b) => a.start - b.start);

  updateEPGDisplay();
  if (parsed.length > 0) setStatus(`EPG: ${parsed.length} Einträge geladen`);
  else                   setStatus('EPG: Keine Einträge – Struktur prüfen');
}

function updateEPGDisplay() {
  if (!epgData.length) return;
  const wc = getStreamWallclock() || new Date();

  const current = epgData.find(i => wc >= i.start && wc < i.end);
  const titleEl = document.getElementById('epg-title');
  const timeEl  = document.getElementById('epg-time');
  const bar     = document.getElementById('epg-progress-bar');
  const label   = document.getElementById('epg-label');

  const delay = getDelaySecs();
  label.textContent = delay > 8 ? 'Lief um' : 'Jetzt';

  if (current) {
    titleEl.textContent = current.title;
    const startStr = current.start.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
    const endStr   = current.end.toLocaleTimeString('de-DE',   {hour:'2-digit', minute:'2-digit'});
    timeEl.textContent = `${startStr} – ${endStr}`;

    const total    = current.end - current.start;
    const elapsed  = wc - current.start;
    const pct      = Math.min(100, Math.max(0, (elapsed / total) * 100));
    bar.style.width = pct + '%';
  } else {
    titleEl.textContent = '–';
    timeEl.textContent = '';
    bar.style.width = '0%';
  }
}

// ── Stunden-Buttons ──────────────────────────────────────
function buildHourButtons() {
  const container = document.getElementById('hour-scroll');
  container.innerHTML = '';
  const now = new Date();

  for (let h = 0; h <= 7; h++) {
    const t = new Date(now);
    t.setMinutes(0, 0, 0);
    t.setHours(t.getHours() - h);

    const btn = document.createElement('button');
    btn.className = 'hour-btn';
    btn.textContent = h === 0
      ? `${pad(t.getHours())}:00 (jetzt)`
      : `${pad(t.getHours())}:00`;

    const targetDate = new Date(t); // closure
    btn.onclick = () => {
      document.querySelectorAll('.hour-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      jumpToWallclock(targetDate);
    };

    container.appendChild(btn);
  }
}

function pad(n) { return String(n).padStart(2, '0'); }

// ── Status ───────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}

// Stunden-Buttons alle Minute neu bauen (falls Stunde wechselt)
setInterval(buildHourButtons, 60 * 1000);
</script>
</body>
</html>
