<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deutschlandfunk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:     #0d1b2a;
    --border: #1e3250;
    --accent: #4e9af1;
    --live:   #e8453c;
    --text:   #e8edf3;
    --muted:  #7a90a8;
    --btn:    #1e3250;
    --btn-h:  #2a4570;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }

  #header {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #dlf-logo {
    width: 40px; height: 40px; background: #1a73e8; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 15px; font-weight: 800; color: #fff; font-family: Arial, sans-serif;
  }
  #station-name { font-size: 17px; font-weight: 700; }
  #live-badge {
    display: inline-flex; align-items: center;
    background: var(--live); color: #fff; font-size: 10px; font-weight: 700;
    letter-spacing: 0.8px; padding: 2px 6px; border-radius: 3px; margin-top: 2px;
  }
  #live-badge.delayed { background: var(--btn); color: var(--muted); }

  #clock-block {
    padding: 8px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  }
  #stream-clock { font-size: 28px; font-weight: 200; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
  #delay-indicator { font-size: 12px; color: var(--muted); text-align: right; }
  #delay-secs { color: var(--accent); font-weight: 600; }

  #controls { padding: 10px 20px; flex-shrink: 0; }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; background: var(--btn); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-size: 14px; font-weight: 600; padding: 12px 4px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  .btn:active { background: var(--btn-h); }
  .btn .icon { font-size: 18px; }
  .btn .label { font-size: 10px; font-weight: 500; color: var(--muted); }
  #btn-play { flex: 1.4; }
  #btn-play .icon { font-size: 24px; }
  #btn-live { border-color: var(--live); color: var(--live); }
  #btn-live .label { color: inherit; opacity: 0.8; }
  #btn-live.at-live { background: var(--live); color: #fff; }

  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }

  #hour-section { padding: 0 20px 8px; flex-shrink: 0; }
  #hour-scroll { display: flex; gap: 8px; }
  .hour-btn {
    flex: 1; background: var(--btn); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; font-weight: 500; padding: 8px 6px; cursor: pointer;
    font-variant-numeric: tabular-nums; touch-action: manipulation; text-align: center;
  }
  .hour-btn:active { background: var(--btn-h); }
  .hour-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  #epg-section { padding: 0 20px 6px; flex-shrink: 0; }
  #epg-list { display: flex; flex-direction: column; gap: 3px; }
  .epg-row {
    display: flex; align-items: center; gap: 8px;
    background: var(--btn); border: 1px solid var(--border); border-radius: 7px;
    padding: 7px 10px; cursor: pointer; touch-action: manipulation;
  }
  .epg-row:active { background: var(--btn-h); }
  .epg-row.current { border-color: var(--accent); }
  .epg-row.current .epg-time { color: var(--accent); }
  .epg-time { font-size: 12px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; width: 38px; }
  .epg-title { font-size: 12px; font-weight: 500; flex: 1; }
  .epg-icon { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .epg-row.current .epg-icon { color: var(--accent); }

  /* Debug log */
  #log-section {
    margin-top: auto; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; flex-direction: column;
  }
  #log-header { padding: 5px 20px 0; display: flex; align-items: center; justify-content: space-between; }
  #log-clear { font-size: 10px; color: var(--muted); cursor: pointer; padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; background: transparent; }
  #log-list {
    height: 140px; overflow-y: auto; padding: 4px 12px 8px;
    font-family: 'Menlo', 'Courier New', monospace;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .log-line { font-size: 10px; color: var(--muted); padding: 1px 0; line-height: 1.5; }
  .log-line.info span { color: #a8d8ff; }
  .log-line.ok   span { color: #7dd3a8; }
  .log-line.warn span { color: #f4c97a; }
  .log-line.err  span { color: #f47a7a; }
  .log-ts { color: #445566; margin-right: 6px; }

  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
  }
  #loading.hidden { display: none; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Verbinde...</p></div>

<div id="app">
  <div id="header">
    <div id="dlf-logo">dlf</div>
    <div>
      <div id="station-name">Deutschlandfunk</div>
      <div id="live-badge">&#9679; LIVE</div>
    </div>
  </div>

  <div id="clock-block">
    <div id="stream-clock">--:--:--</div>
    <div id="delay-indicator"><span id="delay-secs">0</span>s zurueck</div>
  </div>

  <div id="controls">
    <div class="btn-row">
      <button class="btn" id="btn-m30" onclick="seek(-30)">
        <span class="icon">&#8617;</span><span class="label">30s</span>
      </button>
      <button class="btn" id="btn-m10" onclick="seek(-10)">
        <span class="icon">&#8635;</span><span class="label">10s</span>
      </button>
      <button class="btn" id="btn-play" onclick="togglePlay()">
        <span class="icon" id="play-icon">&#9654;</span>
        <span class="label" id="play-label">Play</span>
      </button>
      <button class="btn" id="btn-p10" onclick="seek(+10)">
        <span class="icon">&#8634;</span><span class="label">10s</span>
      </button>
      <button class="btn" id="btn-live" onclick="goLive()">
        <span class="icon">&#9654;&#9654;</span><span class="label">Live</span>
      </button>
    </div>
  </div>

  <div id="hour-section">
    <div class="section-label">Zur vollen Stunde</div>
    <div id="hour-scroll"></div>
  </div>

  <div id="epg-section">
    <div class="section-label">Programm (letzte 2h) &mdash; anklicken zum Springen</div>
    <div id="epg-list"></div>
  </div>

  <div id="log-section">
    <div id="log-header">
      <div class="section-label" style="margin-bottom:0">Debug-Log</div>
      <button id="log-clear" onclick="clearLog()">loeschen</button>
    </div>
    <div id="log-list"></div>
  </div>
</div>

<audio id="audio" preload="none"></audio>

<script>
var HLS_URL  = 'https://dist.deutschlandfunk.de/dlf/hls-ard/master.m3u8';
var MP3_URL  = 'https://st01.sslstream.dlf.de/dlf/01/128/mp3/stream.mp3';
var DVR_SECS = 7200;

// EPG schemas [h, m, 'Titel']
var EPG_WEEKDAY = [

  [1,0,'Nachrichten'],[1,5,'Kalenderblatt'],[1,10,'Hintergrund'],

  [9,30,'Nachrichten'],[9,35,'Tag fuer Tag'],

  [15,0,'Nachrichten'],[15,5,'Corso'],
  [15,30,'Nachrichten'],[15,35,'@mediasres'],
  [16,0,'Nachrichten'],[16,10,'Buechermarkt'],
  [16,30,'Nachrichten'],[16,35,'Forschung aktuell'],
  [17,0,'Nachrichten'],[17,5,'Wirtschaft und Gesellschaft'],
  [17,30,'Nachrichten'],[17,35,'Kultur heute'],
  [18,0,'Nachrichten'],[18,10,'Informationen am Abend'],[18,40,'Hintergrund'],
  [19,0,'Nachrichten'],[19,5,'Kommentar'],[19,15,'Andruck'],
  [20,0,'Nachrichten'],[20,10,'Musikjournal'],
  [21,0,'Nachrichten'],[21,5,'Musik-Panorama'],
  [22,50,'Sport aktuell'],
  [23,0,'Nachrichten'],[23,10,'Das war der Tag'],[23,57,'National- und Europahymne'],
];
var EPG_SAMSTAG = [
  [0,0,'Nachrichten'],[0,5,'Fazit'],
  [1,0,'Nachrichten'],[1,5,'Interview der Woche'],[1,35,'Hintergrund'],
  [2,0,'Nachrichten'],[2,5,'Sternzeit'],[2,7,'Kulturfragen'],[2,30,'Zwischentoene'],
  [3,0,'Nachrichten'],[3,5,'Weltzeit'],[3,30,'Forschung aktuell'],
  [4,0,'Nachrichten'],[4,5,'Radionacht Information'],
  [5,0,'Nachrichten'],[5,5,'Informationen am Morgen'],
  [9,0,'Nachrichten'],[9,5,'Kalenderblatt'],[9,10,'Gesichter Europas'],
  [9,30,'Nachrichten'],[9,35,'Aus Religion und Gesellschaft'],
  [10,0,'Nachrichten'],[10,8,'Lebenszeit'],
  [11,0,'Nachrichten'],[11,5,'Marktplatz'],
  [12,0,'Nachrichten'],[12,10,'Informationen am Mittag'],
  [13,30,'Nachrichten'],[13,35,'Wirtschaft am Mittag'],
  [14,0,'Nachrichten'],[14,5,'Das Feature'],
  [15,0,'Nachrichten'],[15,5,'Corso'],[15,35,'@mediasres'],
  [16,0,'Nachrichten'],[16,10,'Buechermarkt'],
  [16,30,'Nachrichten'],[16,35,'Forschung aktuell'],
  [17,0,'Nachrichten'],[17,5,'Wirtschaft und Gesellschaft'],
  [17,30,'Nachrichten'],[17,35,'Kultur heute'],
  [18,0,'Nachrichten'],[18,10,'Informationen am Abend'],[18,40,'Hintergrund'],
  [19,0,'Nachrichten'],[19,5,'Kommentar'],[19,15,'Das Feature'],
  [20,0,'Nachrichten'],[20,5,'Hoerspiel'],
  [21,0,'Nachrichten'],[21,5,'Musik-Panorama'],
  [22,50,'Sport aktuell'],
  [23,0,'Nachrichten'],[23,10,'Das war der Tag'],[23,57,'National- und Europahymne'],
];
var EPG_SONNTAG = [
  [0,0,'Nachrichten'],[0,5,'Fazit'],
  [1,0,'Nachrichten'],[1,5,'Interview der Woche'],[1,35,'Hintergrund'],
  [2,0,'Nachrichten'],[2,5,'Kommentare mit Themen der Woche'],[2,57,'Sternzeit'],
  [3,0,'Nachrichten'],[3,5,'Weltzeit'],[3,30,'Forschung aktuell'],
  [4,0,'Nachrichten'],[4,5,'Radionacht Information'],
  [5,0,'Nachrichten'],[5,5,'Informationen am Morgen'],
  [8,35,'Am Sonntagmorgen'],
  [9,0,'Nachrichten'],[9,5,'Kalenderblatt'],[9,10,'Die neue Platte'],
  [9,30,'Nachrichten'],[9,35,'Tag fuer Tag'],
  [10,0,'Nachrichten'],[10,5,'Sonntagsspaziergang'],
  [11,0,'Nachrichten'],[11,5,'Interview der Woche'],
  [12,0,'Nachrichten'],[12,10,'Informationen am Mittag'],
  [13,30,'Nachrichten'],[13,35,'Wirtschaft am Mittag'],
  [14,0,'Nachrichten'],[14,5,'Das Feature'],
  [15,0,'Nachrichten'],[15,5,'Corso'],[15,35,'@mediasres'],
  [16,0,'Nachrichten'],[16,10,'Buechermarkt - Buch der Woche'],
  [16,30,'Nachrichten'],[16,35,'Forschung aktuell'],
  [17,0,'Nachrichten'],[17,5,'Wirtschaft und Gesellschaft'],
  [17,30,'Nachrichten'],[17,35,'Kultur heute'],
  [18,0,'Nachrichten'],[18,10,'Informationen am Abend'],[18,40,'Hintergrund'],
  [19,0,'Nachrichten'],[19,5,'Kommentar'],[19,10,'Sport am Sonntag'],
  [20,0,'Nachrichten'],[20,5,'Feature'],
  [21,0,'Nachrichten'],[21,5,'Konzertdokument der Woche'],
  [23,0,'Nachrichten'],[23,5,'Das war der Tag'],[23,30,'Sportgesprach'],
  [23,57,'National- und Europahymne'],
];

function getSchema(dow) {
  if (dow === 0) return EPG_SONNTAG;
  if (dow === 6) return EPG_SAMSTAG;
  return EPG_WEEKDAY;
}

function buildEPGForDate(d) {
  var schema = getSchema(d.getDay());
  var entries = schema.map(function(s) {
    var start = new Date(d); start.setHours(s[0], s[1], 0, 0);
    return { start: start, title: s[2] };
  });
  return entries.map(function(e, i) {
    return {
      start: e.start, title: e.title,
      end: i + 1 < entries.length
        ? entries[i+1].start
        : new Date(e.start.getTime() + 3600000),
    };
  });
}

// State
var hls         = null;
var hlsReady    = false;
var isFallback  = false;
var pendingSeek = null;
var anchorMedia = null;  // audio.currentTime when anchor was set
var anchorWall  = null;  // wall clock Date when anchor was set
var clockTimer  = null;
var epgTimer    = null;
var seeking     = false;

var audio   = document.getElementById('audio');
var loading = document.getElementById('loading');

window.addEventListener('DOMContentLoaded', function() {
  buildHourButtons();
  initHLS();
  setInterval(buildHourButtons, 60000);
});

// ── HLS ─────────────────────────────────────────────────
function initHLS() {
  log('info', 'HLS.isSupported=' + Hls.isSupported());
  if (!Hls.isSupported()) {
    if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = HLS_URL;
      audio.addEventListener('loadedmetadata', function() {
        loading.classList.add('hidden');
        startClock();
        audio.play().catch(function(){});
        log('warn', 'Native HLS - kein echter DVR-Seek');
      });
    } else { useFallbackMP3(); }
    return;
  }

  hls = new Hls({
    liveSyncDurationCount:       6,
    liveMaxLatencyDurationCount: 12,
    maxMaxBufferLength:          120,
    liveDurationInfinity:        true,
    enableWorker:                true,
  });
  log('info', 'HLS Objekt erstellt, lade ' + HLS_URL);
  hls.loadSource(HLS_URL);
  hls.attachMedia(audio);

  hls.on(Hls.Events.MANIFEST_PARSED, function(_e, data) {
    log('ok', 'MANIFEST_PARSED: ' + (data.levels ? data.levels.length : '?') + ' Levels');
    audio.play().catch(function(e){ log('warn', 'autoplay geblockt: ' + e.message); });
  });

  hls.on(Hls.Events.LEVEL_LOADED, function(_e, data) {
    var det = data.details || {};
    var lsp = hls.liveSyncPosition;
    if (!hlsReady) {
      hlsReady = true;
      loading.classList.add('hidden');
      startClock();
      log('ok', 'LEVEL_LOADED: live=' + det.live + ' totalduration=' + Math.round(det.totalduration||0) + 's');
      log('ok', 'liveSyncPosition=' + (lsp ? lsp.toFixed(2) : 'null'));
    }
    if (lsp && isFinite(lsp) && getDelaySecs() < 15) {
      refreshAnchor();
    }
    if (pendingSeek) {
      log('info', 'pendingSeek vorhanden, fuehre jetzt aus');
      var t = pendingSeek; pendingSeek = null; _doJump(t.date, t.label);
    }
  });

  hls.on(Hls.Events.ERROR, function(_e, data) {
    log('err', 'HLS ERROR type=' + data.type + ' details=' + data.details + ' fatal=' + data.fatal);
    if (data.fatal) { useFallbackMP3(); }
  });

  audio.addEventListener('play',  function() { updatePlayUI(); log('info', 'audio: play'); });
  audio.addEventListener('pause', function() { updatePlayUI(); log('info', 'audio: pause'); });
  audio.addEventListener('timeupdate', onTimeUpdate);
  audio.addEventListener('seeked', function() {
    seeking = false;
    log('ok', 'SEEKED: currentTime=' + audio.currentTime.toFixed(2) + ' => wallclock=' + fmtT(getStreamWallclock()));
    updateEPG();
  });
  audio.addEventListener('waiting', function() { log('warn', 'audio: buffering/waiting'); });
  audio.addEventListener('error',   function(e) { log('err', 'audio error: ' + (audio.error ? audio.error.message : e)); });
}

function useFallbackMP3() {
  isFallback = true; hls = null;
  audio.src = MP3_URL;
  loading.classList.add('hidden');
  audio.play().catch(function(){});
  log('warn', 'MP3-Fallback aktiv - DVR nicht moeglich');
  ['btn-m30','btn-m10','btn-p10','btn-live'].forEach(function(id) {
    var el = document.getElementById(id);
    el.style.opacity = '0.35'; el.style.pointerEvents = 'none';
  });
}

// ── Anchor ──────────────────────────────────────────────
function refreshAnchor() {
  if (!hls) return;
  var lsp = hls.liveSyncPosition;
  if (lsp && isFinite(lsp)) {
    anchorMedia = lsp;
    anchorWall  = new Date();
    // nur jede 10s loggen um log nicht zu fluten
    if (!refreshAnchor._lastLog || Date.now() - refreshAnchor._lastLog > 10000) {
      log('info', 'anchor: lsp=' + lsp.toFixed(2) + ' wall=' + fmtT(anchorWall));
      refreshAnchor._lastLog = Date.now();
    }
  }
}

function getStreamWallclock() {
  if (!anchorWall || anchorMedia === null) return null;
  return new Date(anchorWall.getTime() + (audio.currentTime - anchorMedia) * 1000);
}

function getLiveWallclock() {
  if (!anchorWall || anchorMedia === null || !hls) return new Date();
  var lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return new Date();
  return new Date(anchorWall.getTime() + (lsp - anchorMedia) * 1000);
}

function getDelaySecs() {
  if (!hls) return 0;
  var lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return 0;
  return Math.max(0, Math.round(lsp - audio.currentTime));
}

// ── Steuerung ────────────────────────────────────────────
function seek(deltaSec) {
  if (isFallback || !hls) { log('warn', 'seek: kein HLS'); return; }
  var lsp = hls.liveSyncPosition;
  log('info', 'seek(' + deltaSec + '): lsp=' + (lsp ? lsp.toFixed(2) : 'null') + ' cur=' + audio.currentTime.toFixed(2));
  if (!lsp || !isFinite(lsp)) { log('err', 'seek: lsp ungueltig'); return; }
  var newTime = Math.max(lsp - DVR_SECS, Math.min(lsp, audio.currentTime + deltaSec));
  log('info', 'seek: newTime=' + newTime.toFixed(2) + ' (min=' + (lsp-DVR_SECS).toFixed(0) + ')');
  seeking = true;
  audio.currentTime = newTime;
  updateLiveBadge();
}

function goLive() {
  if (isFallback || !hls) { log('warn', 'goLive: kein HLS'); return; }
  var lsp = hls.liveSyncPosition;
  log('info', 'goLive: lsp=' + (lsp ? lsp.toFixed(2) : 'null') + ' cur=' + audio.currentTime.toFixed(2));
  if (!lsp || !isFinite(lsp)) { log('err', 'goLive: lsp ungueltig'); return; }
  seeking = true;
  audio.currentTime = lsp;
  refreshAnchor();
  updateLiveBadge();
  log('ok', 'goLive: gesetzt auf lsp=' + lsp.toFixed(2));
}

function togglePlay() {
  if (audio.paused) { audio.play(); }
  else              { audio.pause(); }
}

function jumpToWallclock(targetDate, label) {
  log('info', '--- jumpToWallclock: ' + label + ' ---');
  log('info', 'target=' + fmtFull(targetDate));
  log('info', 'anchorWall=' + (anchorWall ? fmtFull(anchorWall) : 'NULL'));
  log('info', 'anchorMedia=' + (anchorMedia !== null ? anchorMedia.toFixed(2) : 'NULL'));
  log('info', 'hls.liveSyncPosition=' + (hls && hls.liveSyncPosition ? hls.liveSyncPosition.toFixed(2) : 'NULL'));
  log('info', 'hlsReady=' + hlsReady + ' isFallback=' + isFallback);

  if (isFallback) { log('warn', 'ABBRUCH: Fallback-Modus'); return; }
  if (!hls)       { log('err', 'ABBRUCH: kein hls-Objekt'); return; }

  if (!anchorWall || anchorMedia === null) {
    log('warn', 'Anchor nicht bereit - speichere als pendingSeek');
    pendingSeek = { date: targetDate, label: label };
    hls.startLoad();
    return;
  }
  _doJump(targetDate, label);
}

function _doJump(targetDate, label) {
  log('info', '_doJump: ' + label);
  if (!hls) { log('err', 'ABBRUCH: kein hls'); return; }
  var lsp = hls.liveSyncPosition;
  log('info', 'lsp=' + (lsp ? lsp.toFixed(2) : 'NULL'));
  if (!lsp || !isFinite(lsp)) { log('err', 'ABBRUCH: lsp ungueltig'); return; }

  var deltaMs    = targetDate.getTime() - anchorWall.getTime();
  var deltaSec   = deltaMs / 1000;
  var targetMedia = anchorMedia + deltaSec;
  var minTime    = lsp - DVR_SECS;

  log('info', 'deltaMs=' + Math.round(deltaMs) + ' deltaSec=' + deltaSec.toFixed(1));
  log('info', 'targetMedia=' + targetMedia.toFixed(2));
  log('info', 'minTime=' + minTime.toFixed(2) + ' lsp=' + lsp.toFixed(2));
  log('info', 'audio.currentTime=' + audio.currentTime.toFixed(2));

  if (targetMedia > lsp) {
    log('err', 'ABBRUCH: targetMedia > lsp (Zukunft)');
    return;
  }
  if (targetMedia < minTime) {
    log('err', 'ABBRUCH: targetMedia < minTime (ausserhalb DVR). Diff=' + (targetMedia - minTime).toFixed(0) + 's');
    return;
  }

  log('ok', 'Setze currentTime=' + targetMedia.toFixed(2));
  seeking = true;
  audio.currentTime = targetMedia;
  updateLiveBadge();
}

// ── UI ───────────────────────────────────────────────────
function updatePlayUI() {
  var p = audio.paused;
  document.getElementById('play-icon').textContent  = p ? '\u25B6' : '\u23F8';
  document.getElementById('play-label').textContent = p ? 'Play' : 'Pause';
}

function updateLiveBadge() {
  var isLive = getDelaySecs() < 10;
  var badge = document.getElementById('live-badge');
  badge.textContent = isLive ? '\u25CF LIVE' : '\u25CF ZEITVERSETZT';
  badge.classList.toggle('delayed', !isLive);
  document.getElementById('btn-live').classList.toggle('at-live', isLive);
}

function onTimeUpdate() {
  document.getElementById('delay-secs').textContent = getDelaySecs();
  updateLiveBadge();
  if (!seeking) updateEPG();
}

// ── Uhr ─────────────────────────────────────────────────
function startClock() {
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(tickClock, 500);
  tickClock();
  updateEPG();
  if (epgTimer) clearInterval(epgTimer);
  epgTimer = setInterval(updateEPG, 15000);
}

function tickClock() {
  var wc = getStreamWallclock();
  document.getElementById('stream-clock').textContent = (wc || new Date()).toLocaleTimeString('de-DE');
  if (getDelaySecs() < 10) refreshAnchor();
}

// ── EPG ─────────────────────────────────────────────────
function updateEPG() {
  var streamNow = getStreamWallclock() || new Date();
  var liveWall  = getLiveWallclock();
  var winStart  = new Date(liveWall.getTime() - DVR_SECS * 1000);

  var today     = new Date(liveWall); today.setHours(0,0,0,0);
  var yesterday = new Date(today.getTime() - 86400000);
  var entries   = buildEPGForDate(yesterday).concat(buildEPGForDate(today));
  var visible   = entries.filter(function(e) { return e.start < liveWall && e.end > winStart; });

  var list = document.getElementById('epg-list');
  list.innerHTML = '';

  if (!visible.length) {
    var el = document.createElement('div');
    el.className = 'log-line'; el.textContent = 'Keine Eintraege';
    list.appendChild(el); return;
  }

  visible.forEach(function(e) {
    var isCurrent = streamNow >= e.start && streamNow < e.end;
    var row = document.createElement('div');
    row.className = 'epg-row' + (isCurrent ? ' current' : '');

    var timeEl = document.createElement('div');
    timeEl.className = 'epg-time';
    timeEl.textContent = e.start.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});

    var titleEl = document.createElement('div');
    titleEl.className = 'epg-title';
    titleEl.textContent = e.title;

    var iconEl = document.createElement('div');
    iconEl.className = 'epg-icon';
    iconEl.textContent = isCurrent ? '\u25B6' : '\u23F5';

    row.appendChild(timeEl);
    row.appendChild(titleEl);
    row.appendChild(iconEl);

    (function(entry) {
      row.addEventListener('click', function() {
        var label = fmtT(entry.start) + ' ' + entry.title;
        log('info', 'EPG-Klick: ' + label);
        jumpToWallclock(entry.start, label);
      });
    })(e);

    list.appendChild(row);
  });
}

// ── Stunden-Buttons ──────────────────────────────────────
function buildHourButtons() {
  var container = document.getElementById('hour-scroll');
  container.innerHTML = '';
  var now = new Date();
  for (var h = 1; h >= 0; h--) {
    var t = new Date(now);
    t.setMinutes(0, 0, 0);
    t.setHours(t.getHours() - h);
    var btn = document.createElement('button');
    btn.className = 'hour-btn';
    btn.textContent = h === 0 ? pad(t.getHours()) + ':00 (jetzt)' : pad(t.getHours()) + ':00';
    (function(target) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.hour-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        var label = pad(target.getHours()) + ':00 Uhr';
        log('info', 'Stunden-Button: ' + label);
        jumpToWallclock(target, label);
      });
    })(new Date(t));
    container.appendChild(btn);
  }
}

// ── Log ─────────────────────────────────────────────────
function log(level, msg) {
  var t = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  var list = document.getElementById('log-list');
  var line = document.createElement('div');
  line.className = 'log-line ' + level;
  line.innerHTML = '<span class="log-ts">' + t + '</span><span>' + msg + '</span>';
  list.appendChild(line);
  list.scrollTop = list.scrollHeight;
}

function clearLog() {
  document.getElementById('log-list').innerHTML = '';
}

function pad(n) { return String(n).padStart(2, '0'); }

function fmtT(d) {
  if (!d) return 'null';
  return d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
}

function fmtFull(d) {
  if (!d) return 'null';
  return d.toLocaleTimeString('de-DE') + ' (' + d.getTime() + ')';
}
</script>
