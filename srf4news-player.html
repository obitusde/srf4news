<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deutschlandfunk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg:     #0d1b2a;
    --border: #1e3250;
    --accent: #4e9af1;
    --live:   #e8453c;
    --text:   #e8edf3;
    --muted:  #7a90a8;
    --btn:    #1e3250;
    --btn-h:  #2a4570;
  }
  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; }

  /* Header */
  #header {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #dlf-logo {
    width: 44px; height: 44px; background: #1a73e8; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -1px; font-family: Arial, sans-serif;
  }
  #header-text { flex: 1; min-width: 0; }
  #station-name { font-size: 18px; font-weight: 700; }
  #live-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--live); color: #fff; font-size: 11px; font-weight: 700;
    letter-spacing: 0.8px; padding: 2px 7px; border-radius: 3px; margin-top: 3px;
  }
  #live-badge.delayed { background: var(--btn); color: var(--muted); }

  /* Clock */
  #clock-block {
    padding: 10px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
  }
  #stream-clock { font-size: 32px; font-weight: 200; letter-spacing: 2px; font-variant-numeric: tabular-nums; }
  #delay-indicator { font-size: 13px; color: var(--muted); text-align: right; }
  #delay-secs { color: var(--accent); font-weight: 600; }

  /* Controls */
  #controls { padding: 12px 20px; flex-shrink: 0; }
  .btn-row { display: flex; gap: 8px; }
  .btn {
    flex: 1; background: var(--btn); border: 1px solid var(--border); border-radius: 12px;
    color: var(--text); font-size: 15px; font-weight: 600; padding: 14px 6px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    user-select: none; -webkit-user-select: none; touch-action: manipulation;
  }
  .btn:active { background: var(--btn-h); transform: scale(0.97); }
  .btn .icon { font-size: 20px; }
  .btn .label { font-size: 11px; font-weight: 500; color: var(--muted); }
  #btn-play { flex: 1.4; }
  #btn-play .icon { font-size: 28px; }
  #btn-live { border-color: var(--live); color: var(--live); }
  #btn-live .label { color: inherit; opacity: 0.8; }
  #btn-live.at-live { background: var(--live); color: #fff; }

  /* Section label */
  .section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--muted); margin-bottom: 7px;
  }

  /* Hour buttons */
  #hour-section { padding: 0 20px 10px; flex-shrink: 0; }
  #hour-scroll { display: flex; gap: 8px; }
  .hour-btn {
    flex: 1; background: var(--btn); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 14px; font-weight: 500; padding: 9px 8px; cursor: pointer;
    font-variant-numeric: tabular-nums; touch-action: manipulation; text-align: center;
  }
  .hour-btn:active { background: var(--btn-h); }
  .hour-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* EPG */
  #epg-section { padding: 0 20px 8px; flex-shrink: 0; }
  #epg-list { display: flex; flex-direction: column; gap: 4px; }
  .epg-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--btn); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; cursor: pointer; touch-action: manipulation; transition: background 0.12s;
  }
  .epg-row:active { background: var(--btn-h); }
  .epg-row.current { border-color: var(--accent); }
  .epg-row.current .epg-time { color: var(--accent); }
  .epg-time { font-size: 13px; font-weight: 600; color: var(--muted); font-variant-numeric: tabular-nums; flex-shrink: 0; width: 40px; }
  .epg-title { font-size: 13px; font-weight: 500; flex: 1; line-height: 1.3; }
  .epg-icon { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .epg-row.current .epg-icon { color: var(--accent); }

  /* Log */
  #log-section { margin-top: auto; border-top: 1px solid var(--border); flex-shrink: 0; }
  #log-header { padding: 6px 20px 0; }
  #log-list {
    height: 66px; overflow-y: auto; padding: 4px 20px 8px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .log-line { font-size: 11px; color: var(--muted); padding: 1px 0; font-variant-numeric: tabular-nums; }
  .log-line span { color: var(--text); }

  /* Loading */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; z-index: 100;
  }
  #loading.hidden { display: none; }
  .spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Verbinde...</p></div>

<div id="app">
  <div id="header">
    <div id="dlf-logo">dlf</div>
    <div id="header-text">
      <div id="station-name">Deutschlandfunk</div>
      <div id="live-badge">&#9679; LIVE</div>
    </div>
  </div>

  <div id="clock-block">
    <div id="stream-clock">--:--:--</div>
    <div id="delay-indicator"><span id="delay-secs">0</span>s zurueck</div>
  </div>

  <div id="controls">
    <div class="btn-row">
      <button class="btn" id="btn-m30" onclick="seek(-30)">
        <span class="icon">&#8617;</span><span class="label">30 s</span>
      </button>
      <button class="btn" id="btn-m10" onclick="seek(-10)">
        <span class="icon">&#8635;</span><span class="label">10 s</span>
      </button>
      <button class="btn" id="btn-play" onclick="togglePlay()">
        <span class="icon" id="play-icon">&#9654;</span>
        <span class="label" id="play-label">Play</span>
      </button>
      <button class="btn" id="btn-p10" onclick="seek(+10)">
        <span class="icon">&#8634;</span><span class="label">10 s</span>
      </button>
      <button class="btn" id="btn-live" onclick="goLive()">
        <span class="icon">&#9654;&#9654;</span><span class="label">Live</span>
      </button>
    </div>
  </div>

  <div id="hour-section">
    <div class="section-label">Zur vollen Stunde springen</div>
    <div id="hour-scroll"></div>
  </div>

  <div id="epg-section">
    <div class="section-label">Programm (letzte 2h)</div>
    <div id="epg-list"></div>
  </div>

  <div id="log-section">
    <div id="log-header"><div class="section-label">Log</div></div>
    <div id="log-list"></div>
  </div>
</div>

<audio id="audio" preload="none"></audio>

<script>
const HLS_URL  = 'https://dist.deutschlandfunk.de/dlf/hls-ard/master.m3u8';
const MP3_URL  = 'https://st01.sslstream.dlf.de/dlf/01/128/mp3/stream.mp3';
const DVR_SECS = 7200;

// Hartkodiertes EPG [h, m, 'Titel'] - end = naechster start
const EPG_WEEKDAY = [
  [0,0,'Nachrichten'],[0,5,'Fazit'],
  [1,0,'Nachrichten'],[1,5,'Kalenderblatt'],[1,10,'Hintergrund'],
  [2,0,'Nachrichten'],[2,5,'Sternzeit'],[2,7,'Kulturfragen'],
  [3,0,'Nachrichten'],[3,5,'Weltzeit'],[3,30,'Forschung aktuell'],
  [4,0,'Nachrichten'],[4,5,'Radionacht Information'],
  [5,0,'Nachrichten'],[5,5,'Informationen am Morgen'],
  [9,0,'Nachrichten'],[9,5,'Kalenderblatt'],[9,10,'Europa heute'],
  [9,30,'Nachrichten'],[9,35,'Tag fuer Tag'],
  [10,0,'Nachrichten'],[10,8,'Journal am Vormittag'],
  [11,30,'Nachrichten'],[11,35,'Umwelt und Verbraucher'],
  [12,0,'Nachrichten'],[12,10,'Informationen am Mittag'],
  [13,30,'Nachrichten'],[13,35,'Wirtschaft am Mittag'],
  [14,0,'Nachrichten'],[14,10,'Deutschland heute'],
  [14,30,'Nachrichten'],[14,35,'Campus & Karriere'],
  [15,0,'Nachrichten'],[15,5,'Corso'],
  [15,30,'Nachrichten'],[15,35,'@mediasres'],
  [16,0,'Nachrichten'],[16,10,'Buechermarkt'],
  [16,30,'Nachrichten'],[16,35,'Forschung aktuell'],
  [17,0,'Nachrichten'],[17,5,'Wirtschaft und Gesellschaft'],
  [17,30,'Nachrichten'],[17,35,'Kultur heute'],
  [18,0,'Nachrichten'],[18,10,'Informationen am Abend'],[18,40,'Hintergrund'],
  [19,0,'Nachrichten'],[19,5,'Kommentar'],[19,15,'Andruck'],
  [20,0,'Nachrichten'],[20,10,'Musikjournal'],
  [21,0,'Nachrichten'],[21,5,'Musik-Panorama'],
  [22,50,'Sport aktuell'],
  [23,0,'Nachrichten'],[23,10,'Das war der Tag'],[23,57,'National- und Europahymne'],
];

const EPG_SAMSTAG = [
  [0,0,'Nachrichten'],[0,5,'Fazit'],
  [1,0,'Nachrichten'],[1,5,'Kalenderblatt'],[1,10,'Interview der Woche'],[1,35,'Hintergrund'],
  [2,0,'Nachrichten'],[2,5,'Sternzeit'],[2,7,'Kulturfragen'],[2,30,'Zwischentoene'],
  [3,0,'Nachrichten'],[3,5,'Weltzeit'],[3,30,'Forschung aktuell'],
  [4,0,'Nachrichten'],[4,5,'Radionacht Information'],
  [5,0,'Nachrichten'],[5,5,'Informationen am Morgen'],
  [9,0,'Nachrichten'],[9,5,'Kalenderblatt'],[9,10,'Gesichter Europas'],
  [9,30,'Nachrichten'],[9,35,'Aus Religion und Gesellschaft'],
  [10,0,'Nachrichten'],[10,8,'Lebenszeit'],
  [11,0,'Nachrichten'],[11,5,'Marktplatz'],
  [12,0,'Nachrichten'],[12,10,'Informationen am Mittag'],
  [13,30,'Nachrichten'],[13,35,'Wirtschaft am Mittag'],
  [14,0,'Nachrichten'],[14,5,'Das Feature'],
  [15,0,'Nachrichten'],[15,5,'Corso'],[15,35,'@mediasres'],
  [16,0,'Nachrichten'],[16,10,'Buechermarkt - Buecher fuer junge Leser'],
  [16,30,'Nachrichten'],[16,35,'Forschung aktuell'],
  [17,0,'Nachrichten'],[17,5,'Wirtschaft und Gesellschaft'],
  [17,30,'Nachrichten'],[17,35,'Kultur heute'],
  [18,0,'Nachrichten'],[18,10,'Informationen am Abend'],[18,40,'Hintergrund'],
  [19,0,'Nachrichten'],[19,5,'Kommentar'],[19,15,'Das Feature'],
  [20,0,'Nachrichten'],[20,5,'Hoerspiel'],
  [21,0,'Nachrichten'],[21,5,'Musik-Panorama'],
  [22,50,'Sport aktuell'],
  [23,0,'Nachrichten'],[23,10,'Das war der Tag'],[23,57,'National- und Europahymne'],
];

const EPG_SONNTAG = [
  [0,0,'Nachrichten'],[0,5,'Fazit'],
  [1,0,'Nachrichten'],[1,5,'Kalenderblatt'],[1,10,'Interview der Woche'],[1,35,'Hintergrund'],
  [2,0,'Nachrichten'],[2,5,'Kommentare mit Themen der Woche'],[2,57,'Sternzeit'],
  [3,0,'Nachrichten'],[3,5,'Weltzeit'],[3,30,'Forschung aktuell'],
  [4,0,'Nachrichten'],[4,5,'Radionacht Information'],
  [5,0,'Nachrichten'],[5,5,'Informationen am Morgen'],
  [8,35,'Am Sonntagmorgen'],
  [9,0,'Nachrichten'],[9,5,'Kalenderblatt'],[9,10,'Die neue Platte'],
  [9,30,'Nachrichten'],[9,35,'Tag fuer Tag'],
  [10,0,'Nachrichten'],[10,5,'Sonntagsspaziergang'],
  [11,0,'Nachrichten'],[11,5,'Interview der Woche'],
  [12,0,'Nachrichten'],[12,10,'Informationen am Mittag'],
  [13,30,'Nachrichten'],[13,35,'Wirtschaft am Mittag'],
  [14,0,'Nachrichten'],[14,5,'Das Feature'],
  [15,0,'Nachrichten'],[15,5,'Corso'],[15,35,'@mediasres'],
  [16,0,'Nachrichten'],[16,10,'Buechermarkt - Buch der Woche'],
  [16,30,'Nachrichten'],[16,35,'Forschung aktuell'],
  [17,0,'Nachrichten'],[17,5,'Wirtschaft und Gesellschaft'],
  [17,30,'Nachrichten'],[17,35,'Kultur heute'],
  [18,0,'Nachrichten'],[18,10,'Informationen am Abend'],[18,40,'Hintergrund'],
  [19,0,'Nachrichten'],[19,5,'Kommentar'],[19,10,'Sport am Sonntag'],
  [20,0,'Nachrichten'],[20,5,'Feature'],
  [21,0,'Nachrichten'],[21,5,'Konzertdokument der Woche'],
  [23,0,'Nachrichten'],[23,5,'Das war der Tag'],[23,30,'Sportgesprach'],
  [23,57,'National- und Europahymne'],
];

function getSchema(dow) {
  if (dow === 0) return EPG_SONNTAG;
  if (dow === 6) return EPG_SAMSTAG;
  return EPG_WEEKDAY;
}

function buildEPGForDate(d) {
  const schema = getSchema(d.getDay());
  const entries = schema.map(function(s) {
    var start = new Date(d); start.setHours(s[0], s[1], 0, 0);
    return { start: start, title: s[2] };
  });
  return entries.map(function(e, i) {
    return {
      start: e.start,
      title: e.title,
      end: i + 1 < entries.length
        ? entries[i+1].start
        : new Date(e.start.getTime() + 3600000),
    };
  });
}

// State
var hls         = null;
var hlsReady    = false;
var isFallback  = false;
var pendingSeek = null;
var anchorMedia = null;
var anchorWall  = null;
var clockTimer  = null;
var epgTimer    = null;
var seeking     = false;

var audio   = document.getElementById('audio');
var loading = document.getElementById('loading');

window.addEventListener('DOMContentLoaded', function() {
  buildHourButtons();
  initHLS();
  setInterval(buildHourButtons, 60000);
});

function initHLS() {
  if (!Hls.isSupported()) {
    if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      audio.src = HLS_URL;
      audio.addEventListener('loadedmetadata', function() {
        loading.classList.add('hidden');
        startClock();
        audio.play().catch(function(){});
        log('Native HLS - Timeshift eingeschraenkt');
      });
    } else { useFallbackMP3(); }
    return;
  }

  hls = new Hls({
    liveSyncDurationCount:       6,
    liveMaxLatencyDurationCount: 12,
    maxMaxBufferLength:          120,
    liveDurationInfinity:        true,
    enableWorker:                true,
  });
  hls.loadSource(HLS_URL);
  hls.attachMedia(audio);
  hls.on(Hls.Events.MANIFEST_PARSED, function() { audio.play().catch(function(){}); });
  hls.on(Hls.Events.LEVEL_LOADED, function(_e, data) {
    if (!hlsReady) {
      hlsReady = true;
      loading.classList.add('hidden');
      startClock();
      var dvr = Math.round(((data.details && data.details.totalduration) || 0) / 60);
      log('Stream bereit - DVR ~' + dvr + ' Min');
    }
    if (getDelaySecs() < 15) refreshAnchor();
    if (pendingSeek) { var t = pendingSeek; pendingSeek = null; _doJump(t); }
  });
  hls.on(Hls.Events.ERROR, function(_e, data) {
    if (data.fatal) { log('HLS-Fehler, MP3-Fallback'); useFallbackMP3(); }
  });

  audio.addEventListener('play',       updatePlayUI);
  audio.addEventListener('pause',      updatePlayUI);
  audio.addEventListener('timeupdate', onTimeUpdate);
  audio.addEventListener('seeked',     function() { seeking = false; updateEPG(); });
}

function useFallbackMP3() {
  isFallback = true; hls = null;
  audio.src = MP3_URL;
  loading.classList.add('hidden');
  audio.play().catch(function(){});
  log('MP3-Fallback aktiv - kein Timeshift');
  ['btn-m30','btn-m10','btn-p10','btn-live'].forEach(function(id) {
    var el = document.getElementById(id);
    el.style.opacity = '0.35'; el.style.pointerEvents = 'none';
  });
}

function refreshAnchor() {
  if (!hls) return;
  var lsp = hls.liveSyncPosition;
  if (lsp && isFinite(lsp)) { anchorMedia = lsp; anchorWall = new Date(); }
}

function getStreamWallclock() {
  if (!anchorWall || anchorMedia === null) return null;
  return new Date(anchorWall.getTime() + (audio.currentTime - anchorMedia) * 1000);
}

function getLiveWallclock() {
  if (!anchorWall || anchorMedia === null || !hls) return new Date();
  var lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return new Date();
  return new Date(anchorWall.getTime() + (lsp - anchorMedia) * 1000);
}

function getDelaySecs() {
  if (!hls) return 0;
  var lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return 0;
  return Math.max(0, Math.round(lsp - audio.currentTime));
}

function seek(deltaSec) {
  if (isFallback || !hls) return;
  var lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return;
  var newTime = Math.max(lsp - DVR_SECS, Math.min(lsp, audio.currentTime + deltaSec));
  seeking = true;
  audio.currentTime = newTime;
  updateLiveBadge();
  log('Seek ' + (deltaSec > 0 ? '+' : '') + deltaSec + 's -> ' + fmtT(getStreamWallclock()));
}

function goLive() {
  if (isFallback || !hls) return;
  var lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return;
  seeking = true;
  audio.currentTime = lsp;
  refreshAnchor();
  updateLiveBadge();
  log('>> Live');
}

function togglePlay() {
  if (audio.paused) { audio.play(); log('> Play'); }
  else              { audio.pause(); log('|| Pause'); }
}

function jumpToWallclock(targetDate, label) {
  if (isFallback) return;
  if (!anchorWall || anchorMedia === null) {
    pendingSeek = targetDate;
    log('Warte auf Sync... (' + label + ')');
    if (hls) hls.startLoad();
    return;
  }
  _doJump(targetDate, label);
}

function _doJump(targetDate, label) {
  if (!hls) return;
  var lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) { log('Stream nicht bereit'); return; }
  var targetMedia = anchorMedia + (targetDate.getTime() - anchorWall.getTime()) / 1000;
  var minTime = lsp - DVR_SECS;
  if (targetMedia > lsp)     { log((label || fmtT(targetDate)) + ': liegt in der Zukunft'); return; }
  if (targetMedia < minTime) { log((label || fmtT(targetDate)) + ': ausserhalb DVR-Fenster'); return; }
  seeking = true;
  audio.currentTime = targetMedia;
  updateLiveBadge();
  log('>> ' + (label || fmtT(targetDate)));
}

function updatePlayUI() {
  var p = audio.paused;
  document.getElementById('play-icon').textContent  = p ? '\u25B6' : '\u23F8';
  document.getElementById('play-label').textContent = p ? 'Play' : 'Pause';
}

function updateLiveBadge() {
  var isLive = getDelaySecs() < 10;
  var badge = document.getElementById('live-badge');
  badge.textContent = isLive ? '\u25CF LIVE' : '\u25CF ZEITVERSETZT';
  badge.classList.toggle('delayed', !isLive);
  document.getElementById('btn-live').classList.toggle('at-live', isLive);
}

function onTimeUpdate() {
  document.getElementById('delay-secs').textContent = getDelaySecs();
  updateLiveBadge();
  if (!seeking) updateEPG();
}

function startClock() {
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(tickClock, 500);
  tickClock();
  updateEPG();
  if (epgTimer) clearInterval(epgTimer);
  epgTimer = setInterval(updateEPG, 15000);
}

function tickClock() {
  var wc = getStreamWallclock();
  document.getElementById('stream-clock').textContent = (wc || new Date()).toLocaleTimeString('de-DE');
  if (getDelaySecs() < 10) refreshAnchor();
}

function updateEPG() {
  var streamNow = getStreamWallclock() || new Date();
  var liveWall  = getLiveWallclock();
  var winStart  = new Date(liveWall.getTime() - DVR_SECS * 1000);

  var today     = new Date(liveWall); today.setHours(0,0,0,0);
  var yesterday = new Date(today.getTime() - 86400000);
  var entries   = buildEPGForDate(yesterday).concat(buildEPGForDate(today));
  var visible   = entries.filter(function(e) { return e.start < liveWall && e.end > winStart; });

  var list = document.getElementById('epg-list');
  list.innerHTML = '';

  if (!visible.length) {
    var el = document.createElement('div');
    el.className = 'log-line'; el.textContent = 'Keine Daten';
    list.appendChild(el); return;
  }

  visible.forEach(function(e) {
    var isCurrent = streamNow >= e.start && streamNow < e.end;
    var row = document.createElement('div');
    row.className = 'epg-row' + (isCurrent ? ' current' : '');

    var timeEl = document.createElement('div');
    timeEl.className = 'epg-time';
    timeEl.textContent = e.start.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});

    var titleEl = document.createElement('div');
    titleEl.className = 'epg-title';
    titleEl.textContent = e.title;

    var iconEl = document.createElement('div');
    iconEl.className = 'epg-icon';
    iconEl.textContent = isCurrent ? '\u25B6' : '\u23F5';

    row.appendChild(timeEl);
    row.appendChild(titleEl);
    row.appendChild(iconEl);

    (function(entry, te) {
      row.onclick = function() {
        var label = te.textContent + ' ' + entry.title;
        jumpToWallclock(entry.start, label);
      };
    })(e, timeEl);

    list.appendChild(row);
  });
}

function buildHourButtons() {
  var container = document.getElementById('hour-scroll');
  container.innerHTML = '';
  var now = new Date();

  for (var h = 1; h >= 0; h--) {
    var t = new Date(now);
    t.setMinutes(0, 0, 0);
    t.setHours(t.getHours() - h);

    var btn = document.createElement('button');
    btn.className = 'hour-btn';
    btn.textContent = h === 0
      ? pad(t.getHours()) + ':00 (letzte)'
      : pad(t.getHours()) + ':00';

    (function(target, label) {
      btn.onclick = function() {
        document.querySelectorAll('.hour-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        jumpToWallclock(target, label);
      };
    })(new Date(t), pad(t.getHours()) + ':00 Uhr');

    container.appendChild(btn);
  }
}

function pad(n) { return String(n).padStart(2, '0'); }

function log(msg) {
  var t = new Date().toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
  var list = document.getElementById('log-list');
  var line = document.createElement('div');
  line.className = 'log-line';
  line.innerHTML = t + ' <span>' + msg + '</span>';
  list.appendChild(line);
  list.scrollTop = list.scrollHeight;
}

function fmtT(d) {
  if (!d) return '?';
  return d.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
}
</script>
