<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Deutschlandfunk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg:       #0d1b2a;
    --panel:    #152338;
    --border:   #1e3250;
    --accent:   #4e9af1;
    --live:     #e8453c;
    --text:     #e8edf3;
    --muted:    #7a90a8;
    --btn:      #1e3250;
    --btn-h:    #2a4570;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #dlf-logo {
    width: 52px; height: 52px;
    background: #1a73e8;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -1px;
    font-family: Arial, sans-serif;
  }

  #header-text { flex: 1; min-width: 0; }

  #station-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  #live-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--live);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    padding: 2px 7px;
    border-radius: 3px;
    margin-top: 3px;
  }
  #live-badge.delayed { background: var(--btn); color: var(--muted); }

  /* ── EPG ── */
  #epg-block {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 88px;
  }

  #epg-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  #epg-title {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #epg-time { font-size: 13px; color: var(--muted); }

  #epg-progress-wrap {
    margin-top: 10px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  #epg-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 8s linear;
  }

  /* ── Clock ── */
  #clock-block {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  #stream-clock {
    font-size: 36px;
    font-weight: 200;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }

  #delay-indicator { font-size: 13px; color: var(--muted); text-align: right; }
  #delay-secs { color: var(--accent); font-weight: 600; }

  /* ── Controls ── */
  #controls { padding: 20px; flex-shrink: 0; }

  .btn-row { display: flex; gap: 10px; }

  .btn {
    flex: 1;
    background: var(--btn);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-weight: 600;
    padding: 18px 8px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  .btn:active { background: var(--btn-h); transform: scale(0.97); }
  .btn .icon { font-size: 22px; }
  .btn .label { font-size: 11px; font-weight: 500; color: var(--muted); }

  #btn-play { flex: 1.4; }
  #btn-play .icon { font-size: 32px; }

  #btn-live { border-color: var(--live); color: var(--live); }
  #btn-live .label { color: inherit; opacity: 0.8; }
  #btn-live.at-live { background: var(--live); color: #fff; }

  /* ── Hour buttons ── */
  #hour-section { padding: 0 20px 16px; flex-shrink: 0; }

  #hour-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  #hour-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  #hour-scroll::-webkit-scrollbar { display: none; }

  .hour-btn {
    flex-shrink: 0;
    background: var(--btn);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 10px 16px;
    cursor: pointer;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
    touch-action: manipulation;
  }
  .hour-btn:active { background: var(--btn-h); }
  .hour-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Status ── */
  #status-bar {
    margin-top: auto;
    padding: 12px 20px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── Loading ── */
  #loading {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }
  #loading.hidden { display: none; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>Verbinde…</p>
</div>

<div id="app">

  <div id="header">
    <div id="dlf-logo">dlf</div>
    <div id="header-text">
      <div id="station-name">Deutschlandfunk</div>
      <div id="live-badge">● LIVE</div>
    </div>
  </div>

  <div id="epg-block">
    <div id="epg-label">Jetzt</div>
    <div id="epg-title">Wird geladen…</div>
    <div id="epg-time"></div>
    <div id="epg-progress-wrap"><div id="epg-bar"></div></div>
  </div>

  <div id="clock-block">
    <div id="stream-clock">--:--:--</div>
    <div id="delay-indicator"><span id="delay-secs">0</span>s zurück</div>
  </div>

  <div id="controls">
    <div class="btn-row">
      <button class="btn" id="btn-m30" onclick="seek(-30)">
        <span class="icon">↩</span><span class="label">30 s</span>
      </button>
      <button class="btn" id="btn-m10" onclick="seek(-10)">
        <span class="icon">↺</span><span class="label">10 s</span>
      </button>
      <button class="btn" id="btn-play" onclick="togglePlay()">
        <span class="icon" id="play-icon">▶</span>
        <span class="label" id="play-label">Play</span>
      </button>
      <button class="btn" id="btn-p10" onclick="seek(+10)">
        <span class="icon">↻</span><span class="label">10 s</span>
      </button>
      <button class="btn" id="btn-live" onclick="goLive()">
        <span class="icon">▶▶</span><span class="label">Live</span>
      </button>
    </div>
  </div>

  <div id="hour-section">
    <div id="hour-label">Zur vollen Stunde springen</div>
    <div id="hour-scroll"></div>
  </div>

  <div id="status-bar">Bereit</div>

</div>

<audio id="audio" preload="none"></audio>

<script>
// ── Konfiguration ───────────────────────────────────────
const HLS_URL    = 'https://dist.deutschlandfunk.de/dlf/hls-ard/master.m3u8';
const MP3_URL    = 'https://st01.sslstream.dlf.de/dlf/01/128/mp3/stream.mp3';
const PUBLISHER  = 'urn:ard:publisher:230618cb036fb289';
const EPG_API    = 'https://programm-api.ard.de/program/api/program';
const DVR_WINDOW = 7200; // 2h

// ── State ───────────────────────────────────────────────
let hls            = null;
let hlsReady       = false;
let isFallback     = false;
let pendingSeek    = null;   // Wallclock-Ziel das nach Anchor-Bereitschaft ausgeführt wird

// Anchor: verbindet Mediatime mit Wallclock
let anchorMedia    = null;   // audio.currentTime beim Ankerpunkt
let anchorWall     = null;   // Date-Objekt beim Ankerpunkt
let anchorLive     = null;   // liveSyncPosition beim Ankerpunkt

let epgData        = [];
let clockTimer     = null;
let seeking        = false;  // verhindert Re-Entrancy beim Seek

const audio   = document.getElementById('audio');
const loading = document.getElementById('loading');

// ── Initialisierung ─────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildHourButtons();
  initHLS();
  fetchEPG();
  setInterval(buildHourButtons, 60_000);
});

// ── HLS Setup ───────────────────────────────────────────
function initHLS() {
  if (!Hls.isSupported()) {
    if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      // Native HLS (Safari/iOS) – kein DVR-Seek möglich
      audio.src = HLS_URL;
      audio.addEventListener('loadedmetadata', () => {
        loading.classList.add('hidden');
        startClock();
        audio.play().catch(() => {});
        setStatus('Native HLS – Timeshift eingeschränkt');
      });
    } else {
      useFallbackMP3();
    }
    return;
  }

  hls = new Hls({
    // Grosszügige DVR-Einstellungen – verhindert automatisches Zurückspringen
    liveSyncDurationCount:      6,
    liveMaxLatencyDurationCount: 12,
    maxMaxBufferLength:         120,
    // Kein aggressives Live-Syncing
    liveDurationInfinity:       true,
    enableWorker:               true,
  });

  hls.loadSource(HLS_URL);
  hls.attachMedia(audio);

  hls.on(Hls.Events.MANIFEST_PARSED, () => {
    audio.play().catch(() => {});
  });

  // Erst nach LEVEL_LOADED ist liveSyncPosition verlässlich
  hls.on(Hls.Events.LEVEL_LOADED, (_e, data) => {
    if (!hlsReady) {
      hlsReady = true;
      loading.classList.add('hidden');
      startClock();
      // DVR-Verfügbarkeit prüfen
      const details = data.details;
      if (details && details.live) {
        const dvrSecs = Math.round(details.totalduration || 0);
        setStatus(dvrSecs > 60
          ? `DVR verfügbar: ~${Math.round(dvrSecs/60)} Min`
          : 'DVR: Kein ausreichendes Puffer');
      }
    }
    // Anchor immer aktualisieren wenn nah an Live
    if (getDelaySecs() < 15) refreshAnchor();

    // Ausstehenden Sprung jetzt ausführen (Anchor ist frisch)
    if (pendingSeek) {
      const target = pendingSeek;
      pendingSeek = null;
      _doJumpToWallclock(target);
    }
  });

  hls.on(Hls.Events.ERROR, (_e, data) => {
    if (data.fatal) {
      console.warn('HLS fatal error:', data.type, data.details);
      useFallbackMP3();
    }
  });

  audio.addEventListener('play',       updatePlayUI);
  audio.addEventListener('pause',      updatePlayUI);
  audio.addEventListener('timeupdate', onTimeUpdate);
  audio.addEventListener('seeked',     onSeeked);
}

function useFallbackMP3() {
  isFallback = true;
  hls = null;
  audio.src = MP3_URL;
  loading.classList.add('hidden');
  audio.play().catch(() => {});
  setStatus('MP3-Fallback aktiv (kein Timeshift)');
  ['btn-m30','btn-m10','btn-p10','btn-live'].forEach(id => {
    const el = document.getElementById(id);
    el.style.opacity = '0.3';
    el.style.pointerEvents = 'none';
  });
  document.querySelectorAll('.hour-btn').forEach(b => {
    b.style.opacity = '0.3';
    b.style.pointerEvents = 'none';
  });
}

// ── Anchor-System ────────────────────────────────────────
// Verbindet audio.currentTime mit echter Uhrzeit
function refreshAnchor() {
  if (!hls) return;
  const lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return;
  anchorMedia = lsp;
  anchorWall  = new Date();
  anchorLive  = lsp;
}

// Liefert die Wallclock-Zeit des aktuell gehörten Moments
function getStreamWallclock() {
  if (!anchorWall || anchorMedia === null) return null;
  const delta = audio.currentTime - anchorMedia;
  return new Date(anchorWall.getTime() + delta * 1000);
}

// Versatz zur Live-Kante in Sekunden
function getDelaySecs() {
  if (!hls) return 0;
  const lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return 0;
  return Math.max(0, Math.round(lsp - audio.currentTime));
}

// ── Steuerung ────────────────────────────────────────────
function seek(deltaSec) {
  if (isFallback || !hls) return;
  const lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return;
  const minTime = lsp - DVR_WINDOW;
  const newTime = Math.max(minTime, Math.min(lsp, audio.currentTime + deltaSec));
  seeking = true;
  audio.currentTime = newTime;
  updateLiveBadge();
}

function goLive() {
  if (isFallback || !hls) return;
  const lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) return;
  seeking = true;
  audio.currentTime = lsp;
  refreshAnchor();
  updateLiveBadge();
}

function togglePlay() {
  if (audio.paused) audio.play();
  else audio.pause();
}

// Sprung zu einem Wallclock-Zeitstempel
function jumpToWallclock(targetDate) {
  if (isFallback) return;
  if (!anchorWall || anchorMedia === null) {
    // Anchor noch nicht bereit – Sprung für später vormerken
    pendingSeek = targetDate;
    setStatus('Warte auf Stream-Synchronisation…');
    // Anchor-Bereitschaft erzwingen durch erneutes Level-Load
    if (hls) hls.startLoad();
    return;
  }
  _doJumpToWallclock(targetDate);
}

function _doJumpToWallclock(targetDate) {
  if (!hls) return;
  const lsp = hls.liveSyncPosition;
  if (!lsp || !isFinite(lsp)) {
    setStatus('Stream noch nicht bereit – bitte warten');
    return;
  }

  // Mediatime für den Ziel-Wallclock berechnen
  const deltaFromAnchor = (targetDate.getTime() - anchorWall.getTime()) / 1000;
  const targetMedia = anchorMedia + deltaFromAnchor;
  const minTime = lsp - DVR_WINDOW;

  if (targetMedia > lsp) {
    setStatus('Zielzeit liegt in der Zukunft');
    return;
  }
  if (targetMedia < minTime) {
    setStatus(`Ausserhalb DVR-Fenster (max. ${DVR_WINDOW/3600}h zurück)`);
    return;
  }

  seeking = true;
  audio.currentTime = targetMedia;
  updateLiveBadge();
  const t = targetDate.toLocaleTimeString('de-DE', {hour:'2-digit', minute:'2-digit'});
  setStatus(`Gesprungen zu ${t}`);
}

// nach einem Seek: Anchor neu setzen und EPG aktualisieren
function onSeeked() {
  seeking = false;
  updateEPGDisplay();
}

// ── UI ───────────────────────────────────────────────────
function updatePlayUI() {
  const paused = audio.paused;
  document.getElementById('play-icon').textContent  = paused ? '▶' : '⏸';
  document.getElementById('play-label').textContent = paused ? 'Play' : 'Pause';
}

function updateLiveBadge() {
  const delay   = getDelaySecs();
  const badge   = document.getElementById('live-badge');
  const btnLive = document.getElementById('btn-live');
  const isLive  = delay < 10;
  badge.textContent = isLive ? '● LIVE' : '● ZEITVERSETZT';
  badge.classList.toggle('delayed', !isLive);
  btnLive.classList.toggle('at-live', isLive);
}

function onTimeUpdate() {
  document.getElementById('delay-secs').textContent = getDelaySecs();
  updateLiveBadge();
  if (!seeking) updateEPGDisplay();
}

// ── Uhr ──────────────────────────────────────────────────
function startClock() {
  if (clockTimer) clearInterval(clockTimer);
  clockTimer = setInterval(tickClock, 500);
  tickClock();
}

function tickClock() {
  const wc = getStreamWallclock();
  const el = document.getElementById('stream-clock');
  el.textContent = (wc || new Date()).toLocaleTimeString('de-DE');
  // Anchor laufend nachkalibrieren wenn live
  if (getDelaySecs() < 10) refreshAnchor();
}

// ── EPG ──────────────────────────────────────────────────
async function fetchEPG() {
  const dates = [new Date()];
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  dates.push(tomorrow);

  for (const d of dates) {
    const dateStr = d.toISOString().slice(0, 10);
    // KORREKTUR: Parameter heisst "publisher", nicht "publisherId"
    const url = `${EPG_API}?publisher=${encodeURIComponent(PUBLISHER)}&date=${dateStr}&maxLength=50`;
    try {
      const res = await fetch(url);
      if (!res.ok) { console.warn('EPG HTTP', res.status); continue; }
      const json = await res.json();
      parseEPG(json, d !== dates[0]);
    } catch(e) {
      console.warn('EPG Fehler:', e);
    }
  }

  setTimeout(fetchEPG, 5 * 60_000);
}

function parseEPG(json, append = false) {
  // ARD API: Struktur kann variieren – defensiv durchsuchen
  let items = [];

  const probe = (obj) => {
    if (!obj || typeof obj !== 'object') return;
    if (Array.isArray(obj)) { if (obj.length > 0) items = obj; return; }
    for (const key of ['broadcastSchedule','items','program','broadcasts','schedule']) {
      if (Array.isArray(obj[key])) { items = obj[key]; return; }
    }
    // Eine Ebene tiefer
    for (const key of Object.keys(obj)) {
      if (Array.isArray(obj[key]) && obj[key].length > 0) {
        // Nur wenn Einträge broadcastStart oder ähnliches haben
        if (obj[key][0]?.broadcastStart || obj[key][0]?.startDate || obj[key][0]?.start) {
          items = obj[key];
          return;
        }
      }
    }
  };

  if (json.data) probe(json.data);
  else probe(json);

  const parsed = items.map(item => ({
    title: item.title || item.broadcastTitle || item.show?.title || item.program?.title || '–',
    start: new Date(item.broadcastStart || item.startDate || item.start || 0),
    end:   new Date(item.broadcastEnd   || item.endDate   || item.end   || 0),
  })).filter(i => i.start && !isNaN(i.start.getTime()) && i.start.getTime() > 0);

  if (append) {
    epgData = [...epgData, ...parsed].sort((a, b) => a.start - b.start);
  } else {
    epgData = parsed.sort((a, b) => a.start - b.start);
  }

  updateEPGDisplay();

  if (parsed.length > 0) {
    setStatus(`EPG: ${epgData.length} Einträge geladen`);
  } else {
    setStatus('EPG: Keine Einträge gefunden – API-Struktur prüfen');
    console.log('EPG raw response:', JSON.stringify(json).slice(0, 500));
  }
}

function updateEPGDisplay() {
  if (!epgData.length) return;
  const wc = getStreamWallclock() || new Date();

  const current = epgData.find(i => wc >= i.start && wc < i.end);
  const delay   = getDelaySecs();

  document.getElementById('epg-label').textContent = delay > 10 ? 'Lief um' : 'Jetzt';

  if (current) {
    document.getElementById('epg-title').textContent = current.title;
    const fmt = { hour: '2-digit', minute: '2-digit' };
    const s = current.start.toLocaleTimeString('de-DE', fmt);
    const e = current.end.toLocaleTimeString('de-DE', fmt);
    document.getElementById('epg-time').textContent = `${s} – ${e}`;
    const total   = current.end - current.start;
    const elapsed = wc - current.start;
    const pct     = Math.min(100, Math.max(0, (elapsed / total) * 100));
    document.getElementById('epg-bar').style.width = pct + '%';
  } else {
    document.getElementById('epg-title').textContent = '–';
    document.getElementById('epg-time').textContent  = '';
    document.getElementById('epg-bar').style.width   = '0%';
  }
}

// ── Stunden-Buttons ──────────────────────────────────────
function buildHourButtons() {
  const container = document.getElementById('hour-scroll');
  container.innerHTML = '';
  const now = new Date();

  for (let h = 0; h <= 7; h++) {
    const t = new Date(now);
    t.setMinutes(0, 0, 0);
    t.setHours(t.getHours() - h);

    const btn = document.createElement('button');
    btn.className = 'hour-btn';
    btn.textContent = h === 0
      ? `${pad(t.getHours())}:00 (jetzt)`
      : `${pad(t.getHours())}:00`;

    const target = new Date(t);
    btn.onclick = () => {
      document.querySelectorAll('.hour-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      jumpToWallclock(target);
    };

    container.appendChild(btn);
  }
}

function pad(n) { return String(n).padStart(2, '0'); }

function setStatus(msg) {
  document.getElementById('status-bar').textContent = msg;
}
</script>
</body>
</html>
